<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>مهردار</title>

  <style>
    body{
      margin:0;
      height:100vh;
      background-image:url("bg.png");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      font-family:sans-serif;
    }

    .container{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      text-align:center;
    }

    .top{
      margin-top:40px;
    }

    .center{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .bottom{
      margin-bottom:40px;
    }

    a{
      text-decoration:none;
      font-size:18px;
      color:inherit;
    }
  </style>

</head>

<body>

  <div class="container">

    <!-- بالا -->
    <div class="top">
      <h1>مهردار</h1>
      <p>راهی بر پایه خرد و راستی</p>
    </div>

    <!-- وسط -->
    <div class="center">
      <div>✦</div>
    </div>

    <!-- پایین -->
    <div class="bottom">
      <a href="#">گشایش اندیشه‌ها</a>
    </div>

  </div>

</body>
</html>
