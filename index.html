<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>مهردار</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: sans-serif;
      color: #d6b35a;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;

      /* پس‌زمینه مهردار */
      background-image: url("bg.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* لایه تاریک برای خوانایی متن */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top {
      margin-top: 40px;
    }

    .title {
      font-size: 48px;
    }

    .subtitle {
      font-size: 16px;
      margin-top: 10px;
      opacity: 0.9;
    }

    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .logo {
      font-size: 60px;
      opacity: 0.9;
    }

    .bottom {
      margin-bottom: 30px;
      font-size: 14px;
      opacity: 0.9;
      line-height: 1.8;
    }
  </style>
</head>

<body>

  <div class="overlay"></div>

  <div class="content">

    <div class="top">
      <div class="title">مهردار</div>
      <div class="subtitle">راهی بر پایه خرد و راستی</div>
    </div>

    <div class="center">
      <div class="logo">✦</div>
    </div>

    <div class="bottom">
      خرد · اندیشه نیک · راستی
    </div>

  </div>

</body>
</html>
